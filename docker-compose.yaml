services:

  # ── react-agent dev ──────────────────────────────────────────────────────────
  react-agent-dev:
    profiles: [dev]
    build:
      context: ./react-agent
      target: dev
    working_dir: /app
    volumes:
      - ./react-agent:/app
      - ./react-agent/.venv:/app/.venv
      - ./cognee/data:/root/.cognee
    environment:
      - UV_PROJECT_ENVIRONMENT=/app/.venv
    ports:
      - "2024:2024"
    env_file:
      - ./.env
      - ./.env.cognee
    networks:
      - elastic-net
    depends_on:
      - cognee
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2024/ok')"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── react-agent prod ─────────────────────────────────────────────────────────
  react-agent-prod:
    profiles: [prod]
    build:
      context: ./react-agent
      target: prod
    volumes:
      - ./cognee/data:/root/.cognee
    ports:
      - "2024:2024"
    env_file:
      - ./.env
      - ./.env.cognee
    networks:
      - elastic-net
    depends_on:
      - cognee
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2024/ok')"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── agent-chat-ui dev ─────────────────────────────────────────────────────────
  agent-chat-ui-dev:
    profiles: [dev]
    build:
      context: ./agent-chat-ui
      target: dev
    working_dir: /app
    volumes:
      - ./agent-chat-ui:/app
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      react-agent-dev:
        condition: service_healthy

  # ── agent-chat-ui prod ────────────────────────────────────────────────────────
  agent-chat-ui-prod:
    profiles: [prod]
    build:
      context: ./agent-chat-ui
      target: prod
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      react-agent-prod:
        condition: service_healthy

  # Cognee: AI knowledge graph system for semantic memory and retrieval
  # Official docs: https://github.com/topoteretes/cognee
  cognee:
    profiles: [dev, prod]
    image: cognee/cognee:main
    container_name: cognee
    ports:
      - "8000:8000"
    volumes:
      # Persist all Cognee data (SQLite, LanceDB, Kuzu graph DB) to host
      - ./cognee/data:/root/.cognee
    env_file:
      - .env.cognee
    networks:
      - elastic-net
    restart: unless-stopped

networks:
  elastic-net:
    driver: bridge