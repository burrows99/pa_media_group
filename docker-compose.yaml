services:
  react-agent:
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    volumes:
      - ./react-agent:/app
    environment:
      - UV_PROJECT_ENVIRONMENT=/app/.venv
    ports:
      - "2024:2024"
    env_file:
      - ./.env
    command:
      - sh
      - -c
      - |
        apt-get install -y make &&
        uv sync --group dev &&
        make test &&
        uv run langgraph dev --port 2024 --no-browser
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2024/ok')"]
      interval: 15s
      timeout: 5s
      retries: 10

  agent-chat-ui:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./agent-chat-ui:/app
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    command: >
      sh -c "npm install -g pnpm && pnpm install && pnpm build && pnpm start"
    depends_on:
      react-agent:
        condition: service_healthy